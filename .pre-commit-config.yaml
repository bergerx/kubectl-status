# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:

-   repo: meta
    hooks:
    -   id: check-useless-excludes

-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
        exclude: '\.regex$'
    -   id: mixed-line-ending
    -   id: check-yaml
        args: [--allow-multiple-documents]
        exclude: '^.krew.yaml$'
    -   id: check-added-large-files

-   repo: local
    hooks:

    # install-pre-push-hook and make-test-e2e are commented out: they got too
    # heavyweight for a local pre-push hook. Delegating to CI for now until
    # their runtime is sorted out.
    # -   id: install-pre-push-hook
    #     name: install-pre-push-hook
    #     entry: pre-commit install -t pre-push
    #     language: system
    #     always_run: true
    #     pass_filenames: false

    -   id: make-test
        name: make test
        entry: make test
        language: system
        always_run: true
        pass_filenames: false

    # -   id: make-test-e2e
    #     name: make test-e2e
    #     stages: [pre-push]
    #     entry: make test-e2e
    #     language: system
    #     always_run: true
    #     pass_filenames: false
