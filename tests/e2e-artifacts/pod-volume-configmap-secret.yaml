apiVersion: v1
kind: ConfigMap
metadata:
  name: e2e-cm-with-data
  namespace: default
data:
  existing-key: hello
---
apiVersion: v1
kind: Secret
metadata:
  name: e2e-secret-healthy-vol
  namespace: default
type: Opaque
data:
  key1: aGVsbG8=
---
apiVersion: v1
kind: Pod
metadata:
  name: e2e-pod-volume-missing-configmap
  namespace: default
spec:
  volumes:
  - name: cfg
    configMap:
      name: e2e-cm-does-not-exist
  containers:
  - name: main
    image: registry.k8s.io/pause:3.9
    volumeMounts:
    - name: cfg
      mountPath: /cfg
---
apiVersion: v1
kind: Pod
metadata:
  name: e2e-pod-volume-missing-secret
  namespace: default
spec:
  volumes:
  - name: sec
    secret:
      secretName: e2e-secret-does-not-exist
  containers:
  - name: main
    image: registry.k8s.io/pause:3.9
    volumeMounts:
    - name: sec
      mountPath: /sec
---
apiVersion: v1
kind: Pod
metadata:
  name: e2e-pod-volume-missing-key
  namespace: default
spec:
  volumes:
  - name: cfg
    configMap:
      name: e2e-cm-with-data
      items:
      - key: missing-key
        path: out.txt
  containers:
  - name: main
    image: registry.k8s.io/pause:3.9
    volumeMounts:
    - name: cfg
      mountPath: /cfg
---
apiVersion: v1
kind: Pod
metadata:
  name: e2e-pod-volume-optional-missing
  namespace: default
spec:
  volumes:
  - name: cfg
    configMap:
      name: e2e-cm-optional-missing
      optional: true
  containers:
  - name: main
    image: registry.k8s.io/pause:3.9
    volumeMounts:
    - name: cfg
      mountPath: /cfg
---
apiVersion: v1
kind: Pod
metadata:
  name: e2e-pod-volume-optional-missing-key
  namespace: default
spec:
  volumes:
  - name: cfg
    configMap:
      name: e2e-cm-with-data
      optional: true
      items:
      - key: also-missing-key
        path: out.txt
  containers:
  - name: main
    image: registry.k8s.io/pause:3.9
    volumeMounts:
    - name: cfg
      mountPath: /cfg
---
apiVersion: v1
kind: Pod
metadata:
  name: e2e-pod-volume-healthy
  namespace: default
spec:
  volumes:
  - name: cfg
    configMap:
      name: e2e-cm-with-data
  - name: sec
    secret:
      secretName: e2e-secret-healthy-vol
  containers:
  - name: main
    image: registry.k8s.io/pause:3.9
    volumeMounts:
    - name: cfg
      mountPath: /cfg
    - name: sec
      mountPath: /sec
