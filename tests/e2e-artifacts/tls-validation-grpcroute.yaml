apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: e2e-tls-grpcroute-healthy
spec:
  parentRefs:
  - name: e2e-tls-gw-healthy
    sectionName: https
  hostnames:
  - e2e-tls.example.com
  rules:
  - backendRefs:
    - name: e2e-tls-svc
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: e2e-tls-grpcroute-mismatch
spec:
  parentRefs:
  - name: e2e-tls-gw-mismatch
    sectionName: https
  # deliberately different from the leaf cert's DNS SANs (e2e-tls.example.com /
  # e2e-tls-alt.example.com) to exercise the GRPCRoute-level hostname check,
  # independent of the parent Gateway listener's own (already-mismatched) hostname.
  hostnames:
  - wrong-route-host.example.com
  rules:
  - backendRefs:
    - name: e2e-tls-svc
      port: 80
