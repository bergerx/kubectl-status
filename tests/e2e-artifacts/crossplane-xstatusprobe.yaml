apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: xstatusprobes.tests.kubectl-status.io
spec:
  group: tests.kubectl-status.io
  names:
    kind: XStatusProbe
    plural: xstatusprobes
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: status-probe
spec:
  compositeTypeRef:
    apiVersion: tests.kubectl-status.io/v1alpha1
    kind: XStatusProbe
  mode: Pipeline
  pipeline:
    - step: render
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: config
            base:
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: probe-a-config
              data:
                state: healthy
          - name: blocked-workload
            base:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: probe-a-blocked
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: probe-a-blocked
                template:
                  metadata:
                    labels:
                      app: probe-a-blocked
                  spec:
                    nodeSelector:
                      kubectl-status.io/e2e-never-schedules: "true"
                    containers:
                      - name: pause
                        image: registry.k8s.io/pause:3.10
                        resources:
                          requests:
                            cpu: 1m
                            memory: 16Mi
    - step: readiness
      functionRef:
        name: function-auto-ready
