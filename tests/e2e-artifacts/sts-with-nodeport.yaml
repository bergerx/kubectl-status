apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sts-with-nodeport
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sts-with-nodeport
  template:
    metadata:
      labels:
        app: sts-with-nodeport
    spec:
      containers:
      - name: sts-with-nodeport
        image: registry.k8s.io/pause:3.9
---
apiVersion: v1
kind: Service
metadata:
  name: sts-with-nodeport
spec:
  type: NodePort
  selector:
    app: sts-with-nodeport
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 80
    nodePort: 30081
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sts-with-nodeport
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: sts-with-nodeport
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sts-with-nodeport-unrelated
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: sts-with-nodeport-unrelated-does-not-exist
