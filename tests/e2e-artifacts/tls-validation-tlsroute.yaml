apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: e2e-tls-gw-tlsroute
spec:
  gatewayClassName: e2e-tls-unused-gwc
  listeners:
  - name: tls-term
    port: 443
    protocol: TLS
    tls:
      mode: Terminate
      certificateRefs:
      - kind: Secret
        name: e2e-tls-leaf-tls
  - name: tls-passthrough
    port: 444
    protocol: TLS
    tls:
      mode: Passthrough
---
apiVersion: gateway.networking.k8s.io/v1
kind: TLSRoute
metadata:
  name: e2e-tlsroute-healthy
spec:
  hostnames:
  - e2e-tls.example.com
  parentRefs:
  - name: e2e-tls-gw-tlsroute
    sectionName: tls-term
  rules:
  - backendRefs:
    - name: e2e-tls-svc
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: TLSRoute
metadata:
  name: e2e-tlsroute-mismatch
spec:
  hostnames:
  - wrong-host.example.com
  parentRefs:
  - name: e2e-tls-gw-tlsroute
    sectionName: tls-term
  rules:
  - backendRefs:
    - name: e2e-tls-svc
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: TLSRoute
metadata:
  name: e2e-tlsroute-passthrough
spec:
  hostnames:
  - passthrough.example.com
  parentRefs:
  - name: e2e-tls-gw-tlsroute
    sectionName: tls-passthrough
  rules:
  - backendRefs:
    - name: e2e-tls-svc
      port: 80
