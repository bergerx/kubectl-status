apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: e2e-tls-httproute-healthy
spec:
  hostnames:
  - e2e-tls.example.com
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: e2e-tls-gw-healthy
    sectionName: https
  rules:
  - backendRefs:
    - name: e2e-tls-svc
      port: 80
    matches:
    - path:
        type: PathPrefix
        value: /
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: e2e-tls-httproute-mismatch
spec:
  hostnames:
  - wrong-host.example.com
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: e2e-tls-gw-mismatch
    sectionName: https
  rules:
  - backendRefs:
    - name: e2e-tls-svc
      port: 80
    matches:
    - path:
        type: PathPrefix
        value: /
