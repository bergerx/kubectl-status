apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sts-without-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sts-without-service
  template:
    metadata:
      labels:
        app: sts-without-service
    spec:
      containers:
      - name: sts-without-service
        image: registry.k8s.io/pause:3.9
