apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: e2e-require-team-label
spec:
  failurePolicy: Fail
  matchConstraints:
    # Scoped to this subtest's own namespace via the built-in kubernetes.io/metadata.name label
    # (every Namespace object carries it automatically) -- without this, denying Deployments
    # without a "team" label applies cluster-wide, breaking any other subtest that creates a
    # Deployment concurrently.
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: e2e-vap-binding
    resourceRules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["deployments"]
  validations:
    - expression: "'team' in object.metadata.labels"
      message: "all Deployments must carry a 'team' label"
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: e2e-require-team-label-binding
spec:
  policyName: e2e-require-team-label
  validationActions: ["Deny"]
