apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: e2e-tls-root-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: e2e-tls-root-ca
spec:
  isCA: true
  commonName: e2e-tls-root-ca
  secretName: e2e-tls-root-ca-secret
  issuerRef:
    name: e2e-tls-root-issuer
    kind: Issuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: e2e-tls-ca-issuer
spec:
  ca:
    secretName: e2e-tls-root-ca-secret
