apiVersion: apps/v1
kind: Deployment
metadata:
  name: e2e-rollouts-three-revisions
spec:
  replicas: 1
  selector:
    matchLabels:
      app: e2e-rollouts-three-revisions
  template:
    metadata:
      labels:
        app: e2e-rollouts-three-revisions
    spec:
      containers:
      - name: nginx
        image: nginx:1.25
